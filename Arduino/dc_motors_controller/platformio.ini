; PlatformIO Project Configuration File
;
; ESP32 Dual-Core DC Motor Controller with Encoder Feedback
; Hardware: ESP32 + 2x TB6612FNG + 3x PA2-50 encoders + 64:1 gearbox

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor settings
monitor_speed = 115200
upload_speed = 921600

; Build flags
build_flags =
    -D CONFIG_FREERTOS_HZ=1000

; Library dependencies (if needed in the future)
lib_deps =

; Partition scheme - default should work, but can be customized
; board_build.partitions = default.csv
